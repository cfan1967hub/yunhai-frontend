<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河池机场云海预测 · 七维优化版</title>
    <style>
/* ========== 基础重置 ========== */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body {
    font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0d2137 100%);
    background-attachment: fixed;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
}
body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,180,216,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,150,199,0.08) 0%, transparent 50%);
    pointer-events: none; z-index:0;
}
.container {
    max-width: 700px; margin: 0 auto; position: relative; z-index:1;
}

/* ========== 头部 ========== */
.header { text-align: center; margin-bottom: 28px; }
.logo-container { display: inline-flex; align-items:center; justify-content:center; margin-bottom:12px; }
.logo-icon {
    width: 68px; height:68px;
    background: linear-gradient(135deg, #00b4d8, #0077b6);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:32px; box-shadow:0 4px 28px rgba(0,180,216,0.5);
    position:relative;
    animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
    0%,100%{box-shadow:0 4px 28px rgba(0,180,216,0.5);}
    50%{box-shadow:0 4px 40px rgba(0,180,216,0.7);}
}
.title {
    font-size: 24px; font-weight:bold; color:#fff;
    text-shadow:0 2px 12px rgba(0,180,216,0.35);
    letter-spacing:1px;
}
.subtitle { font-size:13px; color:rgba(255,255,255,0.65); margin-top:6px; }

/* ========== 毛玻璃卡片 ========== */
.glass-card {
    background: rgba(255,255,255,0.09);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:20px; padding:26px; margin-bottom:16px;
    box-shadow:0 8px 36px rgba(0,0,0,0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.glass-card:hover {
    box-shadow:0 12px 44px rgba(0,0,0,0.4);
}

/* ========== 输入与按钮 ========== */
.input-label { color:rgba(255,255,255,0.85); font-size:13px; margin-bottom:8px; display:block; }
.input {
    width:100%; padding:15px 18px; border:1px solid rgba(255,255,255,0.16);
    border-radius:13px; font-size:15px; margin-bottom:16px;
    background:rgba(255,255,255,0.12); color:#fff; outline:none;
    transition: border-color 0.3s ease;
}
.input:focus { border-color:rgba(0,180,216,0.5); }
.input::placeholder { color:rgba(255,255,255,0.45); }
.btn {
    width:100%; padding:15px; border:none; border-radius:13px;
    font-size:15px; font-weight:bold; cursor:pointer;
    transition:all 0.3s ease; letter-spacing:1px;
}
.btn-blue {
    background:linear-gradient(135deg, #00b4d8, #0077b6);
    color:#fff; box-shadow:0 4px 18px rgba(0,180,216,0.35);
}
.btn-blue:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,180,216,0.45); }
.btn-gray {
    background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.85);
    border:1px solid rgba(255,255,255,0.22); margin-top:10px;
}
.btn-gray:hover { background:rgba(255,255,255,0.22); }
.btn-secondary {
    background:linear-gradient(135deg, #667eea, #764ba2);
    color:#fff; box-shadow:0 4px 18px rgba(102,126,234,0.35);
}
.btn-secondary:hover { transform:translateY(-2px); }
.btn-orange {
    background:linear-gradient(135deg, #fb923c, #f97316);
    color:#fff; box-shadow:0 4px 18px rgba(251,146,60,0.35);
}
.btn-orange:hover { transform:translateY(-2px); }
.btn-wrap { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
#refreshBtn { margin-bottom:16px; }

/* ========== 高概率提醒横幅 ========== */
.alert-banner {
    padding:16px 22px; border-radius:16px; margin-bottom:16px;
    font-size:15px; font-weight:bold; text-align:center;
    animation: alertPulse 2s ease-in-out infinite;
}
.alert-high {
    background:linear-gradient(135deg, rgba(0,217,165,0.2), rgba(0,184,148,0.2));
    border:1px solid rgba(0,217,165,0.4); color:#00d9a5;
}
.alert-top {
    background:linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,165,0,0.25));
    border:2px solid rgba(255,215,0,0.6); color:#ffd700;
    box-shadow:0 0 30px rgba(255,215,0,0.15);
}
@keyframes alertPulse { 0%,100%{opacity:1;} 50%{opacity:0.85;} }

/* ========== 日期标题 ========== */
.day-title {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid rgba(255,255,255,0.12);
}
.day-date { font-size:17px; font-weight:bold; color:#fff; display:flex; align-items:center; gap:10px; }
.day-badge {
    background:linear-gradient(135deg, #00b4d8, #0077b6);
    padding:4px 11px; border-radius:20px; font-size:12px; font-weight:normal;
}
.day-temp { font-size:19px; font-weight:bold; color:#00d9a5; }

/* ========== 天气信息网格 ========== */
.weather-grid {
    display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:22px;
}
.weather-item {
    background:rgba(255,255,255,0.06); border-radius:13px; padding:12px 14px;
    display:flex; align-items:center; gap:10px;
}
.weather-icon {
    font-size:22px; width:36px; height:36px; display:flex; align-items:center; justify-content:center;
    background:rgba(0,180,216,0.16); border-radius:10px; flex-shrink:0;
}
.weather-info { flex:1; min-width:0; }
.weather-label { font-size:11px; color:rgba(255,255,255,0.55); margin-bottom:2px; }
.weather-value { font-size:14px; color:#fff; font-weight:500; }

/* ========== 云海评分区 ========== */
.yunhai-section { background:rgba(255,255,255,0.06); border-radius:18px; padding:22px; }
.yunhai-header { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:16px; }
.yunhai-title { font-size:15px; color:rgba(255,255,255,0.85); }
.progress-ring-container { display:flex; justify-content:center; margin-bottom:16px; }
.progress-ring { position:relative; width:130px; height:130px; }
.progress-ring svg { transform:rotate(-90deg); }
.progress-ring-bg { fill:none; stroke:rgba(255,255,255,0.12); stroke-width:8; }
.progress-ring-fill {
    fill:none; stroke-width:8; stroke-linecap:round;
    transition:stroke-dashoffset 1.1s ease-out;
}
.progress-ring-text {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center;
}
.progress-value { font-size:34px; font-weight:bold; color:#fff; display:block; }
.progress-unit { font-size:13px; color:rgba(255,255,255,0.65); }
.level-high .progress-ring-fill { stroke: #00d9a5; }
.level-mid .progress-ring-fill { stroke: #ffce54; }
.level-low .progress-ring-fill { stroke: #ff6b6b; }
.yunhai-level {
    text-align:center; padding:11px 22px; border-radius:26px; font-size:16px;
    font-weight:bold; display:inline-block; margin:0 auto; width:auto;
}
.level-high {
    background:linear-gradient(135deg, rgba(0,217,165,0.22), rgba(0,184,148,0.22));
    color:#00d9a5; border:1px solid rgba(0,217,165,0.35);
}
.level-mid {
    background:linear-gradient(135deg, rgba(255,206,86,0.22), rgba(255,193,7,0.22));
    color:#ffce54; border:1px solid rgba(255,206,86,0.35);
}
.level-low {
    background:linear-gradient(135deg, rgba(255,107,107,0.22), rgba(255,71,87,0.22));
    color:#ff6b6b; border:1px solid rgba(255,107,107,0.35);
}
.level-top {
    background:linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,165,0,0.25));
    color:#ffd700; border:2px solid rgba(255,215,0,0.5);
    box-shadow:0 0 20px rgba(255,215,0,0.15);
}
.level-top .progress-ring-fill { stroke: #ffd700; }

/* ========== 七维因子拆解 ========== */
.factor-breakdown { margin-top:18px; }
.factor-title { font-size:13px; color:rgba(255,255,255,0.7); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.factor-row {
    display:flex; align-items:center; gap:10px; margin-bottom:8px;
}
.factor-label {
    width:56px; font-size:12px; color:rgba(255,255,255,0.7); text-align:right; flex-shrink:0;
}
.factor-bar-bg {
    flex:1; height:18px; background:rgba(255,255,255,0.08); border-radius:9px;
    overflow:hidden; position:relative;
}
.factor-bar-fill {
    height:100%; border-radius:9px; transition:width 0.8s ease-out;
    min-width:2px;
}
.factor-score {
    width:50px; font-size:11px; color:rgba(255,255,255,0.75); text-align:left; flex-shrink:0;
}
.factor-raw {
    width:60px; font-size:10px; color:rgba(255,255,255,0.5); text-align:right; flex-shrink:0;
}
.decay-tag {
    font-size:9px; padding:1px 4px; border-radius:3px; margin-left:4px;
    display:inline-block;
}
.decay-mountain {
    background:rgba(255,165,0,0.25); color:#ffa500;
}

/* ========== 管理员区域 ========== */
.admin-title {
    font-size:17px; color:#fff; margin-bottom:20px; display:flex; align-items:center; gap:9px;
}
.admin-title::before {
    content:''; width:4px; height:21px; background:linear-gradient(180deg, #00b4d8, #667eea);
    border-radius:2px;
}
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.stat-info {
    background:linear-gradient(135deg, rgba(0,180,216,0.12), rgba(102,126,234,0.12));
    border:1px solid rgba(0,180,216,0.22); padding:16px; border-radius:13px;
    font-size:14px; color:rgba(255,255,255,0.85); margin:16px 0;
}
.stat-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.stat-value { color:#00d9a5; font-weight:bold; }
.stat-label { color:rgba(255,255,255,0.7); }
.accuracy-grid {
    display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:12px;
}
.accuracy-item {
    background:rgba(255,255,255,0.06); border-radius:10px; padding:12px; text-align:center;
}
.accuracy-value { font-size:22px; font-weight:bold; display:block; }
.accuracy-label { font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; }
.record-log {
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09);
    border-radius:13px; padding:16px; font-size:13px; max-height:240px; overflow-y:auto;
}
.log-title {
    font-size:14px; color:rgba(255,255,255,0.65); margin-bottom:13px; padding-bottom:9px;
    border-bottom:1px solid rgba(255,255,255,0.09);
}
.log-timeline { position:relative; padding-left:22px; }
.log-timeline::before {
    content:''; position:absolute; left:6px; top:6px; bottom:6px; width:2px;
    background:linear-gradient(180deg, rgba(0,180,216,0.55), rgba(102,126,234,0.55));
    border-radius:1px;
}
.log-item { position:relative; padding:9px 0; color:rgba(255,255,255,0.75); line-height:1.5; }
.log-item::before {
    content:''; position:absolute; left:-20px; top:15px; width:9px; height:9px;
    background:#00b4d8; border-radius:50%;
}
.log-item strong { color:#00d9a5; }

/* ========== 提示框 ========== */
.tip-box {
    background:rgba(0,180,216,0.08); border:1px solid rgba(0,180,216,0.15);
    border-radius:12px; padding:12px 14px; margin-top:12px; font-size:12px;
    color:rgba(255,255,255,0.7); line-height:1.5;
}
.weight-log {
    background:rgba(0,180,216,0.08); border:1px solid rgba(0,180,216,0.15);
    border-radius:12px; padding:12px 14px; margin-top:12px; font-size:12px;
    color:rgba(255,255,255,0.7); line-height:1.5;
}

/* ========== 回测结果 ========== */
.backtest-result {
    background:linear-gradient(135deg, rgba(102,126,234,0.12), rgba(118,75,162,0.12));
    border:1px solid rgba(102,126,234,0.25); padding:16px; border-radius:13px;
    margin-top:12px; font-size:13px; color:rgba(255,255,255,0.8);
}

/* ========== 备份提示 ========== */
.backup-tip {
    background:linear-gradient(135deg, rgba(251,146,60,0.15), rgba(249,115,22,0.15));
    border:1px solid rgba(251,146,60,0.35); padding:12px 14px; border-radius:12px;
    margin-top:12px; font-size:13px; color:#ffa500; text-align:center;
}

/* ========== 加载 ========== */
.loading-container { text-align:center; padding:55px 20px; }
.spinner {
    width:55px; height:55px; border:3px solid rgba(255,255,255,0.11);
    border-top-color:#00b4d8; border-radius:50%; animation:spin 1s linear infinite;
    margin:0 auto 22px;
}
.loading-text { color:rgba(255,255,255,0.75); font-size:15px; }

.hide { display:none !important; }
.empty-state { text-align:center; padding:32px; color:rgba(255,255,255,0.55); font-size:14px; }
@keyframes spin { to{transform:rotate(360deg);} }

/* ========== 移动端适配 ========== */
@media (max-width:600px) {
    body{padding:14px;}
    .title{font-size:20px;}
    .glass-card{padding:20px;border-radius:17px;}
    .weather-grid{grid-template-columns:1fr;gap:10px;}
    .form-row{grid-template-columns:1fr;gap:10px;}
    .progress-ring{width:110px;height:110px;}
    .progress-value{font-size:28px;}
    .accuracy-grid{grid-template-columns:1fr 1fr;gap:8px;}
    .factor-raw{display:none;}
}
    </style>
</head>
<body>
<div class="container">
    <!-- 头部 -->
    <div class="header">
        <div class="logo-container">
            <div class="logo-icon">✈️</div>
        </div>
        <h1 class="title">河池机场云海预测 · 七维优化版</h1>
        <p class="subtitle">HECHI AIRPORT · 清晨5-9点加权评分 · 渐变函数算法</p>
    </div>

    <!-- 登录/游客 -->
    <div class="glass-card login-box" id="loginBox">
        <label class="input-label">管理员密码</label>
        <input type="password" id="pwdInput" class="input" placeholder="请输入管理员密码">
        <button class="btn btn-blue" onclick="login()">🔐 管理员登录</button>
        <button class="btn btn-gray" onclick="visitorMode()">🚶 游客浏览模式</button>
    </div>

    <!-- 刷新按钮 -->
    <button class="btn btn-blue hide" id="refreshBtn" onclick="getForecast()">
        🔄 刷新三日云海预报
    </button>

    <!-- 高概率提醒横幅 -->
    <div id="alertBanner" class="alert-banner hide"></div>

    <!-- 预报区域 -->
    <div id="forecastArea"></div>

    <!-- 管理员区域 -->
    <div class="glass-card admin-area hide" id="adminArea">
        <h3 class="admin-title">📝 录入实际云海实况</h3>
        <div class="form-row">
            <div class="form-group">
                <label class="input-label">选择任意日期（仅今天及过往）</label>
                <input type="date" id="recordDate" class="input">
            </div>
            <div class="form-group">
                <label class="input-label">云海等级</label>
                <select id="recordYunhai" class="input">
                    <option value="">选择实际云海等级</option>
                    <option value="strong">🌊 强云海</option>
                    <option value="medium">🌫️ 中等云海</option>
                    <option value="weak">☁️ 弱云海</option>
                    <option value="none">❌ 无云海</option>
                </select>
            </div>
        </div>

        <button class="btn btn-secondary" style="margin-top:16px" onclick="submitRecord()">
            📤 提交记录并优化权重
        </button>

        <div class="btn-wrap">
            <button class="btn btn-gray" onclick="exportBackup()">💾 导出备份数据</button>
            <button class="btn btn-gray" onclick="importBackup()">📂 导入恢复数据</button>
        </div>

        <button class="btn btn-orange" style="margin-top:12px" onclick="runBacktest()">
            🔬 历史回测（当前权重）
        </button>
        <div id="backtestResult"></div>

        <!-- 备份提示区域 -->
        <div id="backupTip" class="backup-tip hide">
            📊 已积累 <span id="recordCount">0</span> 条记录，建议备份！
            <button onclick="exportBackup()" style="background:rgba(251,146,60,0.3);border:1px solid rgba(251,146,60,0.5);color:#ffa500;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;margin-left:10px;">立即备份</button>
        </div>

        <div class="stat-area" id="statArea"></div>
        <div class="weight-log" id="weightLog"></div>
        <div class="record-log" id="recordLog"></div>
    </div>
</div>

<script>
/**
 * 河池机场云海预测系统 - 前端
 * 调用后端API获取数据
 */

// ========== 配置 ==========
// 生产环境部署时，改为你的域名，如: https://yunhai.yourdomain.com
// 本地开发时使用: http://localhost:8000
const API_BASE = window.location.origin;

// ========== 天气代码映射（前端渲染用） ==========
const weatherCodeMap = {
    0:"☀️ 晴朗",1:"🌤️ 大部晴朗",2:"⛅ 多云",3:"☁️ 阴天",
    45:"🌫️ 雾",48:"🌨️ 雾凇/霜",
    51:"🌧️ 小雨",53:"🌧️ 中雨",55:"🌧️ 大雨",
    56:"🌧️ 冻小雨",57:"🌧️ 冻大雨",
    61:"🌧️ 阵雨小",63:"🌧️ 阵雨中",65:"🌧️ 阵雨大",
    66:"🌧️ 冻阵雨小",67:"🌧️ 冻阵雨大",
    71:"❄️ 小雪",73:"❄️ 中雪",75:"❄️ 大雪",
    77:"❄️ 雪粒",
    80:"🌦️ 阵小雨",81:"🌦️ 阵中雨",82:"🌦️ 阵大雨",
    85:"🌨️ 阵小雪",86:"🌨️ 阵大雪",
    95:"⛈️ 雷暴",96:"⛈️ 雷暴冰雹",99:"⛈️ 强雷暴冰雹"
};
const weatherIcons = {};
Object.keys(weatherCodeMap).forEach(k=>{ weatherIcons[k] = weatherCodeMap[k].split(' ')[0]; });

const factorNames = {
    dewpoint_diff:'露点差', cloud_cover:'低云量', wind:'风速',
    visibility:'能见度', cloud_base:'云底高度', stability:'逆温强度', sunshine:'天气/日照', rain_suppress:'降水抑制'
};

// 缓存数据
let cachedDays = null;
let isAdmin = false;

// ========== API调用封装 ==========

async function apiGet(path) {
    const resp = await fetch(API_BASE + path);
    if (!resp.ok) {
        const err = await resp.json().catch(() => ({detail: '请求失败'}));
        throw new Error(err.detail || '请求失败');
    }
    return resp.json();
}

async function apiPost(path, body) {
    const resp = await fetch(API_BASE + path, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });
    if (!resp.ok) {
        const err = await resp.json().catch(() => ({detail: '请求失败'}));
        throw new Error(err.detail || '请求失败');
    }
    return resp.json();
}

// ========== SHA-256哈希计算（前端密码验证） ==========
async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ========== 登录/游客 ==========
async function login(){
    let p = document.getElementById('pwdInput').value;
    if(!p) { alert('请输入密码'); return; }
    try {
        let res = await apiPost('/api/login', {password: p});
        if(res.success){
            isAdmin = true;
            document.getElementById('loginBox').classList.add('hide');
            document.getElementById('refreshBtn').classList.remove('hide');
            document.getElementById('adminArea').classList.remove('hide');
            getForecast();
        } else {
            alert(res.message || '密码错误');
        }
    } catch(e) {
        alert('登录失败：' + e.message);
    }
}

function visitorMode(){
    isAdmin = false;
    document.getElementById('loginBox').classList.add('hide');
    document.getElementById('refreshBtn').classList.remove('hide');
    getForecast();
}

// ========== 云海等级判断 ==========
function getYunhaiInfo(score){
    if(score >= 82) return {level:"🌊 云海概率极高", cls:"level-top", label:"🌟 建议前往观赏！绝佳云海时机", score};
    if(score >= 70) return {level:"🌊 云海概率较高", cls:"level-high", label:"✅ 气象条件良好，推荐前往观赏", score};
    if(score >= 55) return {level:"🌫️ 云海概率中等", cls:"level-mid", label:"⚠️ 气象条件尚可，可前往碰运气", score};
    return {level:"☁️ 云海概率偏低", cls:"level-low", label:"❌ 气象条件一般，不建议专程前往", score};
}

// ========== 最佳观赏时段 ==========
function calcBestTime(sunriseStr){
    if(!sunriseStr) return "清晨 05:00 - 09:00";
    let [h,m] = sunriseStr.split(':').map(Number);
    let startH = Math.max(0, h - 1);
    let endH = h + 3;
    return `${String(startH).padStart(2,'0')}:${String(m).padStart(2,'0')} ～ ${String(endH).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ========== 获取天气预报 ==========
async function getForecast(){
    const area = document.getElementById('forecastArea');
    area.innerHTML = `<div class="glass-card"><div class="loading-container"><div class="spinner"></div><p class="loading-text">正在获取河池气象数据...</p></div></div>`;

    try {
        let data = await apiGet('/api/forecast');
        cachedDays = data.days;

        renderForecastCards(data.days, data.weatherCodeMap, data.weatherIcons, data.factorNames);
        renderAlertBanner(data.days);

        // 更新管理员区域
        if(isAdmin){
            updateRecordLog();
            updateStats();
            document.getElementById('recordCount').textContent = data.recordCount || 0;
        }
    } catch(e) {
        console.error(e);
        area.innerHTML = `<div class="glass-card"><div class="empty-state">网络异常，请稍后重试：${e.message}</div></div>`;
    }
}

// ========== 渲染预报卡片 ==========
function renderForecastCards(days, wCodeMap, wIcons, fNames){
    const area = document.getElementById('forecastArea');
    area.innerHTML = "";

    let now = new Date();
    let isAfter8 = now.getHours() >= 8;
    let startIdx = isAfter8 ? 1 : 0;
    let dayLabels = isAfter8 ? ['明天','后天','大后天'] : ['今天','明天','后天'];

    for(let j = 0; j < 3; j++){
        let i = startIdx + j;
        if(i >= days.length) break;
        let day = days[i];
        let dayLabel = dayLabels[j];
        let info = getYunhaiInfo(day.morningScore);
        let wtext = (wCodeMap && wCodeMap[day.wcode]) || weatherCodeMap[day.wcode] || "🌫️ 未知天气";
        let wicon = (wIcons && wIcons[day.wcode]) || weatherIcons[day.wcode] || "🌡️";
        let c = 2 * Math.PI * 52;
        let off = c - (day.morningScore/100)*c;
        let bestTime = calcBestTime(day.sunrise);

        // 构建七维因子拆解条
        let factorHtml = '<div class="factor-breakdown"><div class="factor-title">📊 七维因子拆解</div>';
        let details = day.morningDetails || {};
        let fn = fNames || factorNames;

        // 降水抑制
        if(details.rain_suppress && details.rain_suppress.hasRainSuppress){
            let pct = Math.round(details.rain_suppress.score * 100);
            factorHtml += `<div class="factor-row">
                <span class="factor-label">${fn.rain_suppress}</span>
                <div class="factor-bar-bg">
                    <div class="factor-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,#66b2ff,#0080ff)"></div>
                </div>
                <span class="factor-score">${pct}%</span>
                <span class="factor-raw">降水抑制</span>
            </div>`;
        }

        Object.keys(fn).forEach(k=>{
            if(k === 'rain_suppress') return;
            let d = details[k];
            if(!d) return;
            let pct = d.max > 0 ? Math.round(d.score / d.max * 100) : 0;
            let barColor = pct >= 70 ? 'linear-gradient(90deg,#00d9a5,#00b894)' :
                           pct >= 40 ? 'linear-gradient(90deg,#ffce54,#fdcb6e)' :
                                       'linear-gradient(90deg,#ff6b6b,#ee5a24)';
            let rawDisplay = '';
            if(k === 'dewpoint_diff') rawDisplay = (d.raw != null ? d.raw.toFixed(1) + '℃' : '-');
            else if(k === 'cloud_cover') rawDisplay = (d.raw != null ? Math.round(d.raw) + '%' : '-');
            else if(k === 'wind') rawDisplay = (d.raw != null ? d.raw.toFixed(1) + 'km/h' : '-');
            else if(k === 'visibility') rawDisplay = (d.raw != null ? d.raw.toFixed(1) + 'km' : '-');
            else if(k === 'cloud_base') rawDisplay = (d.raw != null ? Math.round(d.raw) + 'm' : '-');
            else if(k === 'stability') rawDisplay = (d.raw != null ? d.raw.toFixed(1) + '℃' : '-');
            else if(k === 'sunshine') rawDisplay = weatherCodeMap[Math.round(d.raw)]?.split(' ')[0] || '-';

            let decayTag = '';
            if(k === 'cloud_base' && d.hasMountainDecay){
                decayTag = '<span class="decay-tag decay-mountain">山地</span>';
            }

            factorHtml += `<div class="factor-row">
                <span class="factor-label">${fn[k]}${decayTag}</span>
                <div class="factor-bar-bg">
                    <div class="factor-bar-fill" style="width:${pct}%;background:${barColor}"></div>
                </div>
                <span class="factor-score">${Math.round(d.score)}/${Math.round(d.max)}</span>
                <span class="factor-raw">${rawDisplay}</span>
            </div>`;
        });
        factorHtml += '</div>';

        let rainTip = day.hasPrecipitation ? `<div class="tip-box" style="background:rgba(0,150,255,0.08);border-color:rgba(0,150,255,0.2);color:#66b2ff;">🌧️ 预测有降水天气，云海概率受降水抑制影响</div>` : '';

        area.innerHTML += `
        <div class="glass-card forecast-card">
            <div class="day-title">
                <div class="day-date">
                    <span>${day.date}</span>
                    <span class="day-badge">${dayLabel}</span>
                    ${day.morningScore >= 82 ? '<span class="day-badge" style="background:linear-gradient(135deg,#ffd700,#ff8c00)">🏆 建议前往</span>' :
                      day.morningScore >= 70 ? '<span class="day-badge" style="background:linear-gradient(135deg,#00d9a5,#00b894)">⭐ 高概率</span>' : ''}
                </div>
                <div class="day-temp">${day.tmin}～${day.tmax}°C</div>
            </div>
            <div class="weather-grid">
                <div class="weather-item">
                    <div class="weather-icon">${wicon}</div>
                    <div class="weather-info">
                        <div class="weather-label">天气状况</div>
                        <div class="weather-value">${wtext}</div>
                    </div>
                </div>
                <div class="weather-item">
                    <div class="weather-icon">💧</div>
                    <div class="weather-info">
                        <div class="weather-label">最高湿度</div>
                        <div class="weather-value">${day.hum}%</div>
                    </div>
                </div>
                <div class="weather-item">
                    <div class="weather-icon">☁️</div>
                    <div class="weather-info">
                        <div class="weather-label">平均云量</div>
                        <div class="weather-value">${day.cloud}%</div>
                    </div>
                </div>
                <div class="weather-item">
                    <div class="weather-icon">🌬️</div>
                    <div class="weather-info">
                        <div class="weather-label">最大风速</div>
                        <div class="weather-value">${day.wind} km/h</div>
                    </div>
                </div>
                <div class="weather-item" style="grid-column:span 2">
                    <div class="weather-icon">👁️</div>
                    <div class="weather-info">
                        <div class="weather-label">平均能见度</div>
                        <div class="weather-value">${day.vis.toFixed(1)} km</div>
                    </div>
                </div>
                <div class="weather-item" style="grid-column:span 2">
                    <div class="weather-icon">🌅</div>
                    <div class="weather-info">
                        <div class="weather-label">日出 / 日落</div>
                        <div class="weather-value">${day.sunrise} / ${day.sunset}</div>
                    </div>
                </div>
            </div>
            <div class="yunhai-section ${info.cls}">
                <div class="yunhai-header">
                    <span class="yunhai-title">🌊 云海概率评分（清晨5-9点加权均分）</span>
                </div>
                <div class="progress-ring-container">
                    <div class="progress-ring">
                        <svg width="130" height="130">
                            <circle class="progress-ring-bg" cx="65" cy="65" r="52"/>
                            <circle class="progress-ring-fill" cx="65" cy="65" r="52" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
                        </svg>
                        <div class="progress-ring-text">
                            <span class="progress-value">${day.morningScore}</span>
                            <span class="progress-unit">分</span>
                        </div>
                    </div>
                </div>
                <div style="text-align:center">
                    <div class="yunhai-level ${info.cls}">${info.level}</div>
                    <div style="margin-top:10px;font-size:13px;color:rgba(255,255,255,0.65)">${info.label}</div>
                    <div class="tip-box">
                        🌟 最佳观赏时段（动态适配日出）：${bestTime}
                    </div>
                    ${rainTip}
                </div>
                ${factorHtml}
            </div>
        </div>`;
    }
}

// ========== 高概率提醒横幅 ==========
function renderAlertBanner(days){
    let banner = document.getElementById('alertBanner');
    let now = new Date();
    let isAfter8 = now.getHours() >= 8;
    let startIdx = isAfter8 ? 1 : 0;
    let displayedDays = [];
    for(let j = 0; j < 3; j++){
        let i = startIdx + j;
        if(i < days.length) displayedDays.push(days[i]);
    }
    let highDays = displayedDays.filter(d => d.morningScore >= 70);
    if(highDays.length === 0){
        banner.classList.add('hide');
        return;
    }
    banner.classList.remove('hide');
    let topDays = highDays.filter(d => d.morningScore >= 82);
    if(topDays.length > 0){
        let dates = topDays.map(d => `${d.date}（${d.morningScore}分）`).join('、');
        banner.className = 'alert-banner alert-top';
        banner.innerHTML = `🏆 <strong>建议前往！</strong> ${dates} 云海评分≥82，极佳观赏时机！`;
    } else {
        let dates = highDays.map(d => `${d.date}（${d.morningScore}分）`).join('、');
        banner.className = 'alert-banner alert-high';
        banner.innerHTML = `⭐ <strong>高概率日提醒</strong> ${dates} 云海概率较高，值得关注`;
    }
}

// ========== 提交实况记录 ==========
async function submitRecord(){
    let date = document.getElementById('recordDate').value;
    let val = document.getElementById('recordYunhai').value;
    if(!date || !val){ alert('请选择日期和云海等级'); return; }

    let today = new Date(); today.setHours(0,0,0,0);
    let selected = new Date(date+"T00:00:00");
    if(selected > today){ alert("⚠️ 不能录入未来日期的实况"); return; }

    try {
        let res = await apiPost('/api/records', {date: date, yunhai: val});

        // 显示权重更新日志
        let logHtml = '<div class="log-title">⚙️ 七维权重更新日志</div><div class="log-timeline">';
        if(res.oldWeights && res.newWeights){
            Object.keys(factorNames).forEach(k=>{
                if(k === 'rain_suppress') return;
                logHtml += `<div class="log-item"><strong>${factorNames[k]}：${res.oldWeights[k]} → ${res.newWeights[k]}</strong></div>`;
            });
        }
        if(res.predictedScore !== null){
            let targetMap = {strong:88,medium:65,weak:38,none:15};
            let target = targetMap[val] || 50;
            logHtml += `<div class="log-item" style="color:rgba(255,255,255,0.5)">预测评分 ${res.predictedScore}，实况 ${val}，偏差=${res.predictedScore - target}</div>`;
        }
        logHtml += '</div>';
        document.getElementById('weightLog').innerHTML = logHtml;

        alert('提交成功，权重已自适应优化');
        updateRecordLog();
        updateStats();
        getForecast(); // 刷新预报数据
    } catch(e) {
        alert('提交失败：' + e.message);
    }
}

// ========== 历史回测 ==========
async function runBacktest(){
    try {
        let res = await apiPost('/api/backtest', {});
        let el = document.getElementById('backtestResult');

        if(!res.details || res.details.length === 0){
            el.innerHTML = '<div class="backtest-result">⚠️ 暂无可回测的记录（需提交实况时已缓存天气数据）</div>';
            return;
        }

        let actMap = {strong:'强云海',medium:'中等',weak:'弱',none:'无'};
        let detailsHtml = res.details.map(d=>{
            let icon = d.isHit ? '✅' : '❌';
            return `${icon} ${d.date} 评分${d.score} 实况:${actMap[d.actual]||d.actual}`;
        }).join('<br>');

        el.innerHTML = `<div class="backtest-result">
            <div style="font-weight:bold;margin-bottom:10px;">🔬 回测结果（${res.total}条有效记录，当前权重）</div>
            <div class="accuracy-grid">
                <div class="accuracy-item"><span class="accuracy-value" style="color:#00d9a5">${res.accuracy}%</span><span class="accuracy-label">总准确率</span></div>
                <div class="accuracy-item"><span class="accuracy-value" style="color:#00b4d8">${res.hitRate}%</span><span class="accuracy-label">命中率</span></div>
                <div class="accuracy-item"><span class="accuracy-value" style="color:#ff6b6b">${res.missRate}%</span><span class="accuracy-label">漏报率</span></div>
                <div class="accuracy-item"><span class="accuracy-value" style="color:#ffce54">${res.falseAlarmRate}%</span><span class="accuracy-label">空报率</span></div>
            </div>
            <div class="accuracy-grid" style="margin-top:8px;">
                <div class="accuracy-item"><span class="accuracy-value" style="color:#ffd700">${res.highAccuracy}%</span><span class="accuracy-label">高分命中(${res.highTotal}条)</span></div>
                <div class="accuracy-item"><span class="accuracy-value" style="color:#90EE90">${res.lowAccuracy}%</span><span class="accuracy-label">低分准确(${res.lowTotal}条)</span></div>
            </div>
            <div style="margin-top:12px;font-size:12px;color:rgba(255,255,255,0.5)">
                ${detailsHtml}
            </div>
        </div>`;
    } catch(e) {
        alert('回测失败：' + e.message);
    }
}

// ========== 更新记录日志 ==========
async function updateRecordLog(){
    try {
        let res = await apiGet('/api/records');
        let log = document.getElementById('recordLog');
        if(!res.records || res.records.length === 0){
            log.innerHTML = '<div class="log-title">📋 实况记录</div><div class="empty-state">暂无观测记录</div>';
            return;
        }
        let map = {strong:'🌊 强云海',medium:'🌫️ 中等',weak:'☁️ 弱',none:'❌ 无'};
        let items = res.records.map(x=>{
            let predInfo = x.predicted_score != null ? `（预测${x.predicted_score}分）` : '';
            return `<div class="log-item"><strong>${x.date}</strong><br>${map[x.yunhai]||x.yunhai}${predInfo}</div>`;
        }).join('');
        log.innerHTML = `<div class="log-title">📋 实况记录（${res.total}条）</div><div class="log-timeline">${items}</div>`;
    } catch(e) {
        console.error('获取记录失败:', e);
    }
}

// ========== 更新统计信息 ==========
async function updateStats(){
    try {
        let res = await apiGet('/api/stats');
        let accHtml = '';
        if(res.accuracy){
            let a = res.accuracy;
            accHtml = `<div class="accuracy-grid" style="margin-top:12px">
                <div class="accuracy-item"><span class="accuracy-value" style="color:#00d9a5">${a.accuracy}%</span><span class="accuracy-label">总准确率</span></div>
                <div class="accuracy-item"><span class="accuracy-value" style="color:#00b4d8">${a.hitRate}%</span><span class="accuracy-label">命中率</span></div>
                <div class="accuracy-item"><span class="accuracy-value" style="color:#ff6b6b">${a.missRate}%</span><span class="accuracy-label">漏报率</span></div>
                <div class="accuracy-item"><span class="accuracy-value" style="color:#ffce54">${a.falseAlarmRate}%</span><span class="accuracy-label">空报率</span></div>
            </div>`;
            if(a.highTotal > 0 || a.lowTotal > 0){
                accHtml += `<div class="accuracy-grid" style="margin-top:8px">
                    <div class="accuracy-item"><span class="accuracy-value" style="color:#ffd700">${a.highAccuracy}%</span><span class="accuracy-label">高分命中(${a.highTotal}条)</span></div>
                    <div class="accuracy-item"><span class="accuracy-value" style="color:#90EE90">${a.lowAccuracy}%</span><span class="accuracy-label">低分准确(${a.lowTotal}条)</span></div>
                </div>`;
            }
        } else {
            accHtml = '<div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,0.45)">📊 提交实况后将自动追踪准确率</div>';
        }

        document.getElementById('statArea').innerHTML = `
        <div class="stat-info">
            <div class="stat-row">
                <span class="stat-label">📊 累计观测训练数据</span>
                <span class="stat-value">${res.totalRecords} 条</span>
            </div>
            <div class="stat-row" style="margin-top:6px">
                <span class="stat-label">⚙️ 当前权重体系</span>
                <span class="stat-value">七维渐变函数</span>
            </div>
            ${accHtml}
        </div>`;
    } catch(e) {
        console.error('获取统计失败:', e);
    }
}

// ========== 导出备份 ==========
async function exportBackup(){
    try {
        let data = await apiGet('/api/backup/export');
        let jsonStr = JSON.stringify(data, null, 2);
        let todayStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
        let recordCountStr = data.recordCount > 0 ? `_${data.recordCount}条` : '';
        let fileName = `河池云海七维优化版备份_${todayStr}${recordCountStr}.json`;

        // 下载文件
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const aTag = document.createElement('a');
        aTag.href = url; aTag.download = fileName; aTag.style.display = 'none';
        document.body.appendChild(aTag); aTag.click();
        setTimeout(()=>{document.body.removeChild(aTag);URL.revokeObjectURL(url);},1000);

        // 隐藏备份提示
        document.getElementById('backupTip').classList.add('hide');
    } catch(e) {
        alert('导出失败：' + e.message);
    }
}

// ========== 导入备份 ==========
async function importBackup(){
    let input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = async e => {
        let file = e.target.files[0];
        if(!file) return;
        let reader = new FileReader();
        reader.onload = async event => {
            try {
                let d = JSON.parse(event.target.result);
                let res = await apiPost('/api/backup/import', {
                    weights: d.weights || null,
                    records: d.records || null,
                    version: d.version || null
                });
                alert(`✅ 导入恢复成功，共导入 ${res.importedRecords} 条记录`);
                updateRecordLog();
                updateStats();
                getForecast();
            } catch(err) {
                alert('❌ 备份文件格式错误：' + err.message);
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

// ========== 初始化 ==========
function setMaxDateToday(){
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    const maxDay = `${y}-${m}-${d}`;
    const dateInput = document.getElementById('recordDate');
    dateInput.max = maxDay;
    dateInput.value = maxDay;
}

// 页面加载
window.onload = function(){
    setMaxDateToday();
};
